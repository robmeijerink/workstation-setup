---
# ---------------------------------------------------------
# 1. Fetch Latest Release Metadata from GitHub API
# ---------------------------------------------------------
- name: Get latest Nerd Fonts release metadata
  ansible.builtin.uri:
    url: "https://api.github.com/repos/ryanoasis/nerd-fonts/releases/latest"
    return_content: yes
  register: nerd_fonts_latest
  tags: [fonts]

- name: Extract FiraCode download URL
  ansible.builtin.set_fact:
    firacode_url: "{{ nerd_fonts_latest.json.assets | selectattr('name', 'equalto', 'FiraCode.zip') | map(attribute='browser_download_url') | first }}"
  tags: [fonts]

# ---------------------------------------------------------
# 2. Prepare Font Directories
# ---------------------------------------------------------
- name: Ensure Font directory exists
  ansible.builtin.file:
    path: "{{ (ansible_os_family == 'Darwin') | ternary(lookup('env', 'HOME') + '/Library/Fonts', lookup('env', 'HOME') + '/.local/share/fonts') }}"
    state: directory
    mode: '0755'
  tags: [fonts]

# ---------------------------------------------------------
# 3. Download and Install Fira Code Nerd Font (Idempotent)
# ---------------------------------------------------------
- name: Download and install latest Fira Code Nerd Font
  ansible.builtin.unarchive:
    src: "{{ firacode_url }}"
    dest: "{{ (ansible_os_family == 'Darwin') | ternary(lookup('env', 'HOME') + '/Library/Fonts', lookup('env', 'HOME') + '/.local/share/fonts') }}"
    remote_src: yes
    exclude: ["*.otf", "*.md", "*.txt"]
    # Prevents re-downloading if the font already exists (O(1) on re-run)
    creates: "{{ (ansible_os_family == 'Darwin') | ternary(lookup('env', 'HOME') + '/Library/Fonts/FiraCodeNerdFont-Regular.ttf', lookup('env', 'HOME') + '/.local/share/fonts/FiraCodeNerdFont-Regular.ttf') }}"
  tags: [fonts]

# ---------------------------------------------------------
# 4. Update Font Cache (Ubuntu only)
# ---------------------------------------------------------
- name: Update font cache (Ubuntu)
  ansible.builtin.command: fc-cache -fv
  when: ansible_os_family == 'Debian'
  changed_when: false
  tags: [fonts, ubuntu]
