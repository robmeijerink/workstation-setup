---
# ---------------------------------------------------------
# 1. Preparation: Check & Remove OS Blockers
# ---------------------------------------------------------
- name: Check status of default OS files
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/{{ item }}"
  loop:
    - .zshrc
    - .bashrc
    - .profile
  register: os_files
  tags: [config, dotfiles, cleanup]

- name: Remove default OS files if they are NOT symlinks
  ansible.builtin.file:
    path: "{{ item.stat.path }}"
    state: absent
  # Only delete if the file exists and is a regular file (not a link)
  when: item.stat.exists and not item.stat.islnk
  loop: "{{ os_files.results }}"
  tags: [config, dotfiles, cleanup]

# ---------------------------------------------------------
# 2. Clone Dotfiles Repository
# ---------------------------------------------------------
- name: Clone dotfiles repository from GitHub
  ansible.builtin.git:
    repo: "git@github.com:robmeijerink/dotfiles.git"
    dest: "{{ ansible_user_dir }}/.dotfiles"
    version: main
    accept_hostkey: yes
  register: dotfiles_repo
  tags: [config, dotfiles]

# ---------------------------------------------------------
# 3. Execute Setup Script
# ---------------------------------------------------------
- name: Run dotfiles setup script
  ansible.builtin.shell:
    cmd: "./setup.sh"
    chdir: "{{ ansible_user_dir }}/.dotfiles"
    executable: /bin/bash
  # Always run to ensure symlink integrity, or keep repo-bound for speed
  changed_when: dotfiles_repo.changed
  tags: [config, dotfiles, script]