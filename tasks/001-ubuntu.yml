---
# =========================================================
#  Ubuntu Server (Sway / Wayland) Playbook
# =========================================================

# ---------------------------------------------------------
# 1. Install Base System Requirements via APT
# ---------------------------------------------------------
- name: Install core system requirements for Ubuntu and Homebrew
  ansible.builtin.apt:
    name:
      - build-essential
      - procps
      - curl
      - file
      - git
      - ca-certificates
      - zsh
      - htop
      - wl-clipboard
      - gnupg2
      - gnupg-agent
      - pinentry-curses
      - dbus-user-session
      - gnome-keyring
      - libsecret-1-0
      - unzip
      - zip
      - 7zip
      - xarchiver
      - vlc
      - qtwayland5
      - libavcodec-extra
      - intel-media-va-driver-non-free
      - vdpau-driver-all
      - thunar
      - thunar-volman
      - thunar-archive-plugin
      - tumbler
    state: present
    update_cache: yes
  become: true
  tags: [install, base, ubuntu]

# ---------------------------------------------------------
# 2. Bootstrap Homebrew on Linux
# ---------------------------------------------------------
- name: Check if Homebrew is already installed
  ansible.builtin.stat:
    path: /home/linuxbrew/.linuxbrew/bin/brew
  register: linuxbrew_check
  tags: [install, base, brew]

- name: Install Homebrew (Linuxbrew) silently
  ansible.builtin.shell:
    cmd: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  environment:
    NONINTERACTIVE: "1"
  when: not linuxbrew_check.stat.exists
  tags: [install, base, brew]

# ---------------------------------------------------------
# 3. Install Developer CLI Tools & Runtimes via Homebrew
# ---------------------------------------------------------
- name: Install modern CLI tools and core runtimes (100% parity with macOS)
  community.general.homebrew:
    name:
      # Core Runtimes (Required for Neovim LSPs and DevOps)
      - node
      - go
      - python
      # Development CLI Tools
      - stow
      - tmux
      - fzf
      - ripgrep
      - sd
      - fd
      - jq
      - yq
      - zoxide
      - bat
      - eza
      - lazygit
      - lazydocker
      - git-delta
      - gum
      - sad
      - chafa
      - php-code-sniffer
      - tree-sitter
      - stylua
      - prettierd
    state: present
    update_homebrew: yes
    path: /home/linuxbrew/.linuxbrew/bin
  tags: [install, base, brew, tools]

# ---------------------------------------------------------
# 4. Wayland, Sway & Core Desktop Infrastructure
# ---------------------------------------------------------
- name: Install Sway compositor and essential UI components
  ansible.builtin.apt:
    name:
      - sway
      - swaybg
      - swayidle
      - swaylock
      - waybar
      - wofi
      - mako-notifier
      - xwayland
      - xdg-desktop-portal-wlr
    state: present
  become: true
  tags: [install, desktop, sway]

- name: Install Desktop bridges
  ansible.builtin.apt:
    name:
      -polkit-kde-agent-1
      -udiskie
      -udisks2
    state: present
  become: true

- name: Install hardware daemons (Audio, Network, Bluetooth)
  ansible.builtin.apt:
    name:
      - pipewire
      - pipewire-pulse
      - wireplumber
      - network-manager
      - bluez
      - blueman
      - pavucontrol
    state: present
  become: true
  tags: [install, hardware, daemons]

- name: Install terminal emulator via native package manager
  ansible.builtin.apt:
    name: alacritty
    state: present
  become: true
  tags: [install, desktop, terminal]