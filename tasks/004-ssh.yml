---
# ---------------------------------------------------------
# 1. Define Platform-Specific Socket Path
# ---------------------------------------------------------
- name: Set Bitwarden SSH Agent socket path
  ansible.builtin.set_fact:
    bw_ssh_socket: >-
      {% if ansible_os_family == 'Darwin' %}
      {{ lookup('env', 'HOME') }}/Library/Group Containers/2M4LOGIN.com.8bit.bitwarden/t/ssh-agent.sock
      {% else %}
      {{ lookup('env', 'HOME') }}/.bitwarden-ssh-agent.sock
      {% endif %}
  tags: [always, ssh, security]

# ---------------------------------------------------------
# 2. Directory and File Permissions
# ---------------------------------------------------------
- name: Ensure SSH directories and files are secure
  block:
    - name: Create ~/.ssh directory
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.ssh"
        state: directory
        mode: "0700"

    - name: Ensure known_hosts exists
      ansible.builtin.file:
        path: "{{ lookup('env', 'HOME') }}/.ssh/known_hosts"
        state: touch
        mode: "0600"
        modification_time: preserve
        access_time: preserve
  tags: [ssh, security]

# ---------------------------------------------------------
# 3. Configure ~/.ssh/config for Zero-Disk Policy
# ---------------------------------------------------------
- name: Apply SSH config for Bitwarden Agent integration
  ansible.builtin.copy:
    dest: "{{ lookup('env', 'HOME') }}/.ssh/config"
    mode: "0600"
    content: |
      # Managed by Ansible - Workstation Setup

      Host *
          # ZERO-DISK POLICY: Keys are served directly from Bitwarden memory
          IdentityAgent "{{ bw_ssh_socket }}"

          # Performance & Privacy
          ServerAliveInterval 60
          ServerAliveCountMax 3
          HashKnownHosts yes

          # Essential for modern OpenSSH
          AddKeysToAgent yes
  tags: [ssh, security]
