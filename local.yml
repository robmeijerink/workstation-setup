---
- name: RobMeijerink Workstation Setup
  hosts: localhost
  connection: local
  gather_facts: true
  become: false

  tasks:
    # =========================================================
    # PHASE 1: INSTALLATION & INFRASTRUCTURE (001-099)
    # =========================================================

    - name: 001 OS Base Setup Ubuntu
      ansible.builtin.import_tasks: tasks/001-ubuntu.yml
      when: ansible_os_family == 'Debian'
      tags: [install, base, ubuntu]

    - name: 001 OS Base Setup macOS
      ansible.builtin.import_tasks: tasks/001-macos.yml
      when: ansible_os_family == 'Darwin'
      tags: [install, base, macos]

    - name: 002 Runtime Node.js via fnm
      ansible.builtin.import_tasks: tasks/002-node.yml
      tags: [install, node]

    - name: 003 Security Bitwarden Desktop CLI and Unlock Check
      ansible.builtin.import_tasks: tasks/003-bitwarden.yml
      tags: [install, security, bitwarden]

    - name: 004 Security SSH Bitwarden Agent Integration
      ansible.builtin.import_tasks: tasks/004-ssh.yml
      tags: [install, security, ssh]

    - name: 005 Security GPG
      ansible.builtin.import_tasks: tasks/005-gpg.yml
      tags: [install, security, gpg]

    - name: 006 Install Alacritty Terminal
      ansible.builtin.import_tasks: tasks/006-alacritty.yml
      tags: [install, alacritty, terminal]

    - name: 007 Install Nerd Fonts
      ansible.builtin.import_tasks: tasks/007-fonts.yml
      tags: [install, fonts]

    - name: 008 Virtualization Docker and Colima
      ansible.builtin.import_tasks: tasks/008-docker.yml
      tags: [install, docker]

    - name: 009 Install CLI Tools
      ansible.builtin.import_tasks: tasks/009-cli-tools.yml
      tags: [install, dev, cli]

    - name: 010 Install DEV Tools Go PHP Rust and Debug Adapter
      ansible.builtin.import_tasks: tasks/010-dev-tools.yml
      tags: [install, dev, programming]

    - name: 011 Install Database tools
      ansible.builtin.import_tasks: tasks/011-db-tools.yml
      tags: [install, dev, database]

    - name: 020 Install web browsers
      ansible.builtin.import_tasks: tasks/020-browsers.yml
      tags: [install, desktop]

    - name: 025 Install sway desktop and daemons
      ansible.builtin.import_tasks: tasks/025-sway.yml
      tags: [install, desktop, sway]

    - name: 045 Install Neovim Runtime Dependencies
      ansible.builtin.import_tasks: tasks/045-neovim-deps.yml
      tags: [install, neovim, deps]

    - name: 050 Install Neovim Binary
      ansible.builtin.import_tasks: tasks/050-neovim.yml
      tags: [install, neovim]

    - name: 055 Post-Install Neovim LSP and Mason
      ansible.builtin.import_tasks: tasks/055-neovim-lsp.yml
      tags: [install, neovim, lsp]

    - name: 080 Installs timeshift and defines backup strategy
      ansible.builtin.import_tasks: tasks/080-timeshift.yml
      when: ansible_os_family == 'Debian'
      tags: [install, timeshift, backup]

    - name: 085 Install Office Suite
      ansible.builtin.import_tasks: tasks/085-office.yml
      tags: [optional, office]

    # =========================================================
      # PHASE 2: PERSONAL CONFIGURATION (100+)
    # =========================================================

    - name: 100 Shell Zsh Configuration and Zap Plugins
      ansible.builtin.import_tasks: tasks/100-zsh.yml
      tags: [config, zsh]

    - name: 150 Dotfiles Clone and Stow via setup.sh
      ansible.builtin.import_tasks: tasks/150-dotfiles.yml
      tags: [config, dotfiles]

    - name: 200 Configures tmux and plugin manager
      ansible.builtin.import_tasks: tasks/200-tmux.yml
      tags: [config, tmuxgs]

    # ---------------------------------------------------------
      # Final Step: System Reboot Handler
    # ---------------------------------------------------------
    - name: Check if a reboot is required Ubuntu
      ansible.builtin.stat:
        path: /var/run/reboot-required
      register: reboot_required_file
      when: ansible_os_family == 'Debian'
      tags: [always]

    - name: Prompt for reboot if system changes were made
      ansible.builtin.pause:
        prompt: "System requires a reboot to apply all changes (Docker groups/macOS settings). Reboot now? (y/N)"
      register: reboot_prompt
      when: (reboot_required_file.stat.exists is defined and reboot_required_file.stat.exists) or (ansible_os_family == 'Darwin')
      tags: [always]

    - name: Rebooting machine
      ansible.builtin.reboot:
      become: true
      when:
        - reboot_prompt.user_input is defined
        - reboot_prompt.user_input | lower == 'y'
      tags: [always]
