---
# =========================================================
# Bitwarden Deployment & Authentication Workflow
# =========================================================

# ---------------------------------------------------------
# 1. macOS Installation (Desktop & CLI)
# ---------------------------------------------------------
- name: Install Bitwarden Desktop (macOS)
  community.general.homebrew_cask:
    name: bitwarden
    state: present
  when: ansible_os_family == 'Darwin'
  tags: [bitwarden, install, macos]

- name: Install Bitwarden CLI (macOS)
  community.general.homebrew:
    name: bitwarden-cli
    state: present
  when: ansible_os_family == 'Darwin'
  tags: [bitwarden, install, macos]

# ---------------------------------------------------------
# 2. Ubuntu Installation (Desktop DEB & Native CLI)
# ---------------------------------------------------------
- name: Install Bitwarden Desktop via DEB (Ubuntu)
  block:
    - name: Download Bitwarden Desktop DEB package
      ansible.builtin.get_url:
        url: "https://vault.bitwarden.com/download/?app=desktop&platform=linux&variant=deb"
        dest: "/tmp/bitwarden.deb"
        mode: "0644"

    - name: Install Bitwarden Desktop
      ansible.builtin.apt:
        deb: "/tmp/bitwarden.deb"
        state: present
  become: true
  when: ansible_os_family == 'Debian'
  tags: [bitwarden, install, ubuntu]

- name: Install Bitwarden CLI Native Binary (Ubuntu)
  ansible.builtin.unarchive:
    src: "https://vault.bitwarden.com/download/?app=cli&platform=linux&variant=zip"
    dest: "/usr/local/bin"
    remote_src: yes
    mode: "0755"
    creates: "/usr/local/bin/bw"
  become: true
  when: ansible_os_family == 'Debian'
  tags: [bitwarden, install, ubuntu]

# ---------------------------------------------------------
# 3. Security: Session Validation
# ---------------------------------------------------------
- name: Verify Bitwarden authentication status
  ansible.builtin.shell:
    cmd: "bw status | jq -r .status"
  register: bw_status
  changed_when: false
  failed_when: false
  tags: [always, security]
