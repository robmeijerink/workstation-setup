---
# ---------------------------------------------------------
# 1. Install Base System Dependencies (macOS)
# ---------------------------------------------------------
- name: Ensure Homebrew is up to date and install core CLI tools
  community.general.homebrew:
    name:
      - curl
      - git
      - coreutils
      - stow
      - tmux
      - fzf
      - ripgrep         # Telescope.nvim dep
      - fd              # Telescope.nvim dep
      - jq
      - yq
      - zoxide
      - bat
      - eza
      - lazygit
      - lazydocker
      - git-delta
      - gum
      - ms-jpq/sad/sad
      - chafa
      - php-code-sniffer
      - zsh
      - htop
      - tree-sitter     # lspsaga dep
      - stylua
      - prettierd
    state: present
    update_homebrew: yes
  when: ansible_os_family == 'Darwin'
  tags: [install, base, macos]

# ---------------------------------------------------------
# 2. System Level Tweak: macOS Key Repeat
# ---------------------------------------------------------
# macOS blokkeert standaard het herhalen van toetsen (zoals j/k)
# om een accentmenu te tonen. Dit is dodelijk voor Neovim navigatie.
- name: Disable macOS ApplePressAndHoldEnabled for Neovim navigation
  community.general.osx_defaults:
    domain: NSGlobalDomain
    key: ApplePressAndHoldEnabled
    type: bool
    value: false
  when: ansible_os_family == 'Darwin'
  tags: [config, base, macos, nvim]
