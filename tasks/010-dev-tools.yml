---
# =========================================================
# Development Environment Parity
# Focus: Version Management (asdf)
# =========================================================

# 1. Unified Version Management (asdf)
# ---------------------------------------------------------
- name: Install asdf version manager
  community.general.homebrew:
    name: asdf
    state: present
  tags: [install, dev, runtimes]

- name: Ensure asdf plugins are present for parity
  ansible.builtin.shell: 
    cmd: |
      # Add plugins only if they don't exist
      for plugin in golang php python kubectl; do
        asdf plugin add $plugin || true
      done
  tags: [install, dev, runtimes]

# 2. Ubuntu Specific: System Libraries (Required for asdf runtimes)
# ---------------------------------------------------------
- name: Install build dependencies for asdf runtimes (Ubuntu)
  ansible.builtin.apt:
    name:
      - libxml2-dev
      - libcurl4-openssl-dev
      - libonig-dev
      - libsqlite3-dev
      - libzip-dev
      - pkg-config
      - unzip
    state: present
  become: true
  when: ansible_os_family == 'Debian'
  tags: [install, dev, ubuntu]

# 3. Rust Toolchain (Cross-platform)
# ---------------------------------------------------------
- name: Check for rustup installation
  ansible.builtin.stat:
    path: "{{ lookup('env', 'HOME') }}/.cargo/bin/rustup"
  register: rustup_check
  tags: [install, dev, rust]

- name: Install/Update Rust via rustup
  ansible.builtin.shell:
    cmd: |
      if [ ! -f {{ lookup('env', 'HOME') }}/.cargo/bin/rustup ]; then
        curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --no-modify-path
      else
        {{ lookup('env', 'HOME') }}/.cargo/bin/rustup update
      fi
  changed_when: false
  tags: [install, dev, rust]

# 4. PHP Debug Adapter (vscode-php-debug)
# ---------------------------------------------------------
- name: Prepare build directory
  ansible.builtin.file:
    path: "{{ lookup('env', 'HOME') }}/build"
    state: directory
    mode: '0755'
  tags: [php, debugger]

- name: Sync vscode-php-debug repository
  ansible.builtin.git:
    repo: "https://github.com/xdebug/vscode-php-debug.git"
    dest: "{{ lookup('env', 'HOME') }}/build/vscode-php-debug"
    depth: 1
    version: master
  register: xdebug_clone
  tags: [php, debugger]

- name: Build PHP Debugger using fnm environment
  ansible.builtin.shell:
    # We use fnm to trigger the build without assuming global npm
    cmd: |
      export PATH="{{ lookup('env', 'HOME') }}/.local/share/fnm:$PATH"
      eval "$(fnm env)"
      npm install
      npm run build
    chdir: "{{ lookup('env', 'HOME') }}/build/vscode-php-debug"
    executable: /bin/zsh
  when: xdebug_clone.changed
  tags: [php, debugger]