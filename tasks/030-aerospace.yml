---
# ---------------------------------------------------------
# AeroSpace Window Manager Installation (macOS)
# ---------------------------------------------------------
- name: Set Homebrew path dynamically based on Apple Silicon vs Intel architecture
  ansible.builtin.set_fact:
    homebrew_bin: "{{ '/opt/homebrew/bin/brew' if ansible_architecture == 'arm64' else '/usr/local/bin/brew' }}"
  tags: [install, macos, aerospace]

- name: Ensure AeroSpace is installed via Homebrew Cask
  community.general.homebrew_cask:
    name: aerospace
    state: present
    update_homebrew: true
  tags: [install, macos, aerospace]

- name: Verify AeroSpace installation
  ansible.builtin.command:
    cmd: "aerospace --version"
  register: aerospace_version
  changed_when: false
  tags: [install, macos, aerospace, validation]

- name: Report version
  ansible.builtin.debug:
    msg: "AeroSpace installed: {{ aerospace_version.stdout }}"
  tags: [install, macos, aerospace, validation]