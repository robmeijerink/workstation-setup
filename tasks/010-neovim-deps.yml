---
# ---------------------------------------------------------
# 1. Install Neovim System Dependencies (Telescope, Mason, Core)
# ---------------------------------------------------------
- name: Install Neovim core dependencies (macOS)
  community.general.homebrew:
    name:
      - ripgrep       # Required for Telescope live_grep
      - fd            # Required for Telescope find_files
      - lua@5.1       # Required for rest.nvim
      - unzip         # Required for Mason to extract packages
      - wget          # Required for Mason downloads
    state: present
  when: ansible_os_family == 'Darwin'
  tags: [install, nvim, deps, macos]

- name: Install Neovim core dependencies (Ubuntu)
  ansible.builtin.apt:
    name:
      - ripgrep
      - fd-find       # Ubuntu package name for fd
      - lua5.1
      - unzip
      - wget
      - xclip         # Required for system clipboard integration in Neovim
    state: present
  become: true
  when: ansible_os_family == 'Debian'
  tags: [install, nvim, deps, ubuntu]

# ---------------------------------------------------------
# 2. Install Neovim Node Client (Minimal NPM approach)
# ---------------------------------------------------------
- name: Install Neovim Node.js client via fnm context
  ansible.builtin.shell:
    # Only install the Node client. Mason handles all actual LSPs/formatters.
    cmd: "{{ lookup('env', 'HOME') }}/.local/share/fnm/fnm exec --using=lts-latest npm install -g neovim"
  # O(1) execution: NPM checks the hash and exits cleanly if already installed.
  changed_when: false
  tags: [install, nvim, deps, npm]

# ---------------------------------------------------------
# 3. Post-Install: Symlink fd on Ubuntu
# ---------------------------------------------------------
# Ubuntu installs 'fd' as 'fdfind' to avoid conflicts, but Neovim plugins expect 'fd'.
- name: Ensure 'fd' symlink exists for Telescope (Ubuntu)
  ansible.builtin.file:
    src: /usr/bin/fdfind
    dest: /usr/local/bin/fd
    state: link
  become: true
  when: ansible_os_family == 'Debian'
  tags: [install, nvim, deps, ubuntu]
